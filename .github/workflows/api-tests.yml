name: API Automation Pipeline

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main

jobs:

  api-tests:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:
          - "3.13"

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version:
            ${{ matrix.python-version }}

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install pytest allure-pytest pytest-cov

      - name: Run Tests

        env:

          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

        run: |

          export PYTHONPATH=.

          pytest \
            -v \
            --alluredir=reports

      - name: Upload Allure

        uses: actions/upload-artifact@v4

        with:

          name: allure-results

          path: reports/

      - name: Upload Coverage

        uses: actions/upload-artifact@v4

        with:

          name: coverage

          path: .